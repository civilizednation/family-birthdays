<!DOCTYPE html>
<html class="light" lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 가족 생일 알림이 🎂</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f9faf8">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f9faf8", "on-secondary-container": "#5a6745", "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#dae8be", "tertiary-fixed": "#d1e8dc", "secondary-container": "#d7e5bb",
                        "on-tertiary": "#ffffff", "outline-variant": "#c1c8c2", "surface-container-high": "#e7e8e6",
                        "error": "#ba1a1a", "on-primary": "#ffffff", "primary-fixed": "#c1ecd4",
                        "surface-container": "#edeeec", "on-primary-container": "#86af99", "on-secondary": "#ffffff",
                        "outline": "#717973", "on-tertiary-fixed-variant": "#374b42", "surface-container-low": "#f3f4f2",
                        "on-error-container": "#93000a", "surface-container-highest": "#e2e3e1", "secondary-fixed-dim": "#becca3",
                        "surface-variant": "#e2e3e1", "primary-fixed-dim": "#a5d0b9", "on-primary-fixed": "#002114",
                        "tertiary-fixed-dim": "#b5ccc0", "surface-bright": "#f9faf8", "surface-tint": "#3f6653",
                        "on-error": "#ffffff", "primary": "#012d1d", "secondary": "#566342", "surface": "#f9faf8",
                        "on-background": "#191c1b", "on-surface": "#191c1b", "tertiary-container": "#2c4038",
                        "surface-dim": "#d9dad8", "inverse-surface": "#2e3130", "on-surface-variant": "#414844",
                        "inverse-primary": "#a5d0b9", "on-secondary-fixed-variant": "#3f4b2c", "on-primary-fixed-variant": "#274e3d",
                        "on-tertiary-fixed": "#0b1f18", "inverse-on-surface": "#f0f1ef", "primary-container": "#1b4332",
                        "tertiary": "#162a22", "error-container": "#ffdad6", "on-tertiary-container": "#95aba1",
                        "on-secondary-fixed": "#141f05"
                    },
                    "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.5rem", "full": "9999px" },
                    "fontFamily": {
                        "headline": ["Noto Serif KR", "Noto Serif", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f9faf8;
            min-height: max(884px, 100dvh);
        }

        h1,
        h2,
        h3 {
            font-family: 'Noto Serif KR', 'Noto Serif', serif;
        }

        .editorial-gradient {
            background: radial-gradient(circle at top right, #1B4332 0%, #012d1d 100%);
        }
    </style>
</head>

<body id="cnation-app-container" class="text-on-surface">
    <header class="sticky top-0 z-50 w-full bg-[#f9faf8]/90 backdrop-blur-md shadow-none">
        <div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-[#012d1d]" data-icon="family_history">family_history</span>
                <h1 class="font-['Noto_Serif'] text-xl font-bold tracking-tight text-[#012d1d]">Celebrations</h1>
            </div>
            <nav class="hidden md:flex gap-8">
                <a class="text-[#012d1d] font-bold hover:bg-[#d7e5bb]/50 transition-colors px-3 py-2 rounded-xl"
                    href="#">Timeline</a>
                <a class="text-[#566342] hover:bg-[#d7e5bb]/50 transition-colors px-3 py-2 rounded-xl"
                    href="#addNewSection">Add New</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pt-8 pb-32">
        <section class="mb-12 relative overflow-hidden rounded-2xl editorial-gradient p-12 text-on-primary">
            <div class="relative z-10 max-w-2xl">
                <span class="font-label text-sm uppercase tracking-[0.2em] text-on-primary-container mb-4 block">Archive
                    01</span>
                <h2 class="text-4xl md:text-5xl font-black mb-6 leading-tight">우리 가족 생일 알림이 🎂</h2>
                <p class="font-body text-on-primary-container text-lg max-w-md opacity-90">사소한 순간들이 모여 영원한 유산이 됩니다. 소중한
                    가족의 기념일을 기록하고 기억하세요.</p>
            </div>
            <div class="absolute -right-20 -bottom-20 opacity-10">
                <span class="material-symbols-outlined text-[300px]" data-icon="forest">forest</span>
            </div>
        </section>

        <div id="birthdayList" class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
            <div class="md:col-span-12">
                <p class="text-center text-outline font-medium text-sm py-12">데이터를 불러오는 중입니다...</p>
            </div>
        </div>

        <section id="addNewSection" class="mt-20">
            <div
                class="bg-[#1B4332] rounded-2xl p-8 md:p-10 flex flex-col xl:flex-row items-center justify-between text-on-primary gap-8 shadow-2xl">
                <div class="w-full xl:w-auto text-center xl:text-left shrink-0">
                    <h3 class="text-2xl font-bold mb-2">새로운 기념일 추가하기</h3>
                    <p class="opacity-80 font-body text-sm md:text-base">우리 가족만의 소중한 기록을 추가해 보세요.</p>
                </div>

                <div class="flex flex-col sm:flex-row flex-wrap gap-4 w-full justify-center xl:justify-end">
                    <div class="bg-primary-container p-1 rounded-xl flex items-center px-4 w-full sm:w-[220px]">
                        <span class="material-symbols-outlined text-on-primary-container opacity-60 mr-2 text-sm"
                            data-icon="edit">edit</span>
                        <input id="nameInput"
                            class="bg-transparent border-none focus:ring-0 text-on-primary placeholder:text-on-primary-container w-full py-3 text-sm font-body outline-none"
                            placeholder="누구의 기념일인가요?" type="text" />
                    </div>

                    <div class="bg-primary-container p-1 rounded-xl flex items-center px-4 w-full sm:w-[180px]">
                        <span class="material-symbols-outlined text-on-primary-container opacity-60 mr-2 text-sm"
                            data-icon="calendar_today">calendar_today</span>
                        <input id="dateInput"
                            class="bg-transparent border-none focus:ring-0 text-on-primary w-full py-3 text-sm font-body outline-none"
                            type="date" style="color-scheme: dark;" />
                    </div>

                    <label
                        class="flex items-center justify-center space-x-2 px-4 py-3 rounded-xl bg-primary-container cursor-pointer w-full sm:w-auto hover:bg-[#2c4038] transition-colors">
                        <input type="checkbox" id="isLunar"
                            class="rounded text-surface-container-lowest focus:ring-0 border-none w-4 h-4 bg-primary cursor-pointer">
                        <span class="text-sm font-bold text-on-primary">음력</span>
                    </label>

                    <button id="addBtn"
                        class="w-full sm:w-auto bg-surface-container-lowest text-primary px-8 py-4 rounded-xl font-bold hover:bg-secondary-container transition-all active:scale-95 duration-200">
                        등록하기
                    </button>
                </div>
            </div>
        </section>
    </main>

    <nav
        class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#f9faf8]/90 backdrop-blur-md rounded-t-[1.5rem] shadow-[0_-4px_40px_rgba(1,45,29,0.05)]">
        <a class="flex flex-col items-center justify-center bg-[#1B4332] text-[#f9faf8] rounded-[1.5rem] px-5 py-2 active:scale-90 transition-transform duration-300"
            href="#">
            <span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
            <span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-semibold mt-1">Timeline</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#566342] px-5 py-2 hover:text-[#012d1d] active:scale-90 transition-transform duration-300"
            href="#addNewSection">
            <span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
            <span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-semibold mt-1">Add New</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTwOAC_LrrKH8CKepUOTf0pyd9qRv4y_8",
            authDomain: "cnation-project.firebaseapp.com",
            projectId: "cnation-project",
            storageBucket: "cnation-project.firebasestorage.app",
            messagingSenderId: "1004154104261",
            appId: "1:1004154104261:web:0eac4c7ded38262ae5c3ac",
            measurementId: "G-7PW1NSP5EQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const collectionName = "cnation-family-birthdays";

        function calculateBirthdayInfo(birthDateStr, isLunar) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const [birthYear, birthMonth, birthDay] = birthDateStr.split('-').map(Number);
            const currentYear = today.getFullYear();

            let thisYearBirthdaySolar;

            if (isLunar) {
                const lunarDate = Lunar.fromYmd(currentYear, birthMonth, birthDay);
                const solarDateObj = lunarDate.getSolar();
                thisYearBirthdaySolar = new Date(solarDateObj.getYear(), solarDateObj.getMonth() - 1, solarDateObj.getDay());
            } else {
                thisYearBirthdaySolar = new Date(currentYear, birthMonth - 1, birthDay);
            }

            const diffTime = thisYearBirthdaySolar - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            let dDayText = "";
            let opacityClass = "opacity-100";

            if (diffDays === 0) {
                dDayText = "D-Day 🎉";
            } else if (diffDays > 0) {
                dDayText = `D-${diffDays}`;
            } else {
                dDayText = `D+${Math.abs(diffDays)}`;
                opacityClass = "opacity-50 grayscale-[30%]"; // 지난 기념일 시각적 처리
            }

            // 영어 형식의 예쁜 날짜 출력 (예: November 24, 2024)
            const options = { year: 'numeric', month: 'long', day: '2-digit' };
            const displayDate = thisYearBirthdaySolar.toLocaleDateString('en-US', options);
            const originalDateStr = new Date(birthYear, birthMonth - 1, birthDay).toLocaleDateString('en-US', options);

            return { dDayText, displayDate, originalDateStr, diffDays, opacityClass };
        }

        document.getElementById('addBtn').addEventListener('click', async () => {
            const name = document.getElementById('nameInput').value;
            const date = document.getElementById('dateInput').value;
            const isLunar = document.getElementById('isLunar').checked;

            if (!name || !date) {
                alert('이름과 날짜를 모두 입력해주세요!');
                return;
            }

            await addDoc(collection(db, collectionName), {
                name: name,
                birthDate: date,
                isLunar: isLunar
            });

            document.getElementById('nameInput').value = '';
            document.getElementById('dateInput').value = '';
            document.getElementById('isLunar').checked = false;
        });

        onSnapshot(collection(db, collectionName), (snapshot) => {
            const listDiv = document.getElementById('birthdayList');
            listDiv.innerHTML = '';

            if (snapshot.empty) {
                listDiv.innerHTML = `
                    <div class="md:col-span-12 h-full">
                        <div class="border-2 border-dashed border-outline-variant rounded-2xl p-12 flex flex-col items-center justify-center text-center opacity-60 min-h-[200px]">
                            <span class="material-symbols-outlined text-4xl mb-2" data-icon="event_note">event_note</span>
                            <p class="font-label text-sm uppercase tracking-widest">등록된 기념일이 없습니다. 아래에서 추가해 보세요.</p>
                        </div>
                    </div>`;
                return;
            }

            let birthdays = [];
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const info = calculateBirthdayInfo(data.birthDate, data.isLunar);
                birthdays.push({ id: docSnap.id, data: data, info: info });
            });

            birthdays.sort((a, b) => {
                const diffA = a.info.diffDays;
                const diffB = b.info.diffDays;
                const isAUpcoming = diffA >= 0;
                const isBUpcoming = diffB >= 0;

                if (isAUpcoming && isBUpcoming) return diffA - diffB;
                if (!isAUpcoming && !isBUpcoming) return diffB - diffA;
                if (isAUpcoming && !isBUpcoming) return -1;
                return 1;
            });

            birthdays.forEach((item) => {
                const { id, data, info } = item;
                const lunarTag = data.isLunar
                    ? '<span class="bg-secondary-container text-on-secondary-container px-2 py-0.5 rounded-md text-[10px] font-bold tracking-wider ml-2 align-middle">음력</span>'
                    : '<span class="bg-surface-variant text-on-surface-variant px-2 py-0.5 rounded-md text-[10px] font-bold tracking-wider ml-2 align-middle">양력</span>';

                // D-7 이하의 임박한 기념일은 크게 (col-span-4), 나머지는 가로로 길게 (col-span-6) 배치
                const isImminent = info.diffDays >= 0 && info.diffDays <= 7;
                let itemHtml = "";

                if (isImminent) {
                    itemHtml = `
                    <div class="col-span-1 md:col-span-4 group cursor-pointer active:scale-95 transition-all duration-300 ${info.opacityClass}">
                        <div class="bg-surface-container-lowest rounded-2xl p-8 shadow-[0_4px_40px_rgba(1,45,29,0.03)] border-l-4 border-error h-full flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-8">
                                    <div class="p-4 rounded-xl bg-error-container/20">
                                        <span class="material-symbols-outlined text-error text-3xl" data-icon="cake">cake</span>
                                    </div>
                                    <span class="font-headline text-4xl font-bold text-error">${info.dDayText}</span>
                                </div>
                                <h3 class="text-2xl font-bold mb-2 flex items-center">${data.name} ${lunarTag}</h3>
                                <p class="text-secondary font-medium uppercase tracking-widest text-xs">${info.displayDate}</p>
                            </div>
                            <div class="mt-8 pt-6 border-t border-outline-variant/20 flex justify-end">
                                <button onclick="deleteBirthday('${id}')" class="text-xs text-outline hover:text-error transition-colors underline underline-offset-4">삭제하기</button>
                            </div>
                        </div>
                    </div>`;
                } else {
                    itemHtml = `
                    <div class="col-span-1 md:col-span-6 group ${info.opacityClass}">
                        <div class="bg-surface-container-lowest md:bg-surface-container-low rounded-2xl p-6 md:p-8 shadow-sm md:shadow-none flex items-center gap-6 hover:bg-surface-container transition-colors border border-outline-variant/10 md:border-none">
                            <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-surface-container-highest flex items-center justify-center relative flex-shrink-0">
                                <span class="material-symbols-outlined text-3xl md:text-4xl text-primary" data-icon="event">event</span>
                                <div class="absolute -top-1 -right-1 md:-top-2 md:-right-2 bg-primary text-on-primary text-[10px] font-black min-w-[2.5rem] h-10 rounded-full flex items-center justify-center px-2 shadow-md">${info.dDayText}</div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="text-lg md:text-xl font-bold mb-1 truncate flex items-center">${data.name} ${lunarTag}</h3>
                                <p class="text-on-surface-variant font-body mb-3 text-xs md:text-sm truncate">원래: ${data.birthDate}</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-2 text-secondary font-bold text-xs md:text-sm">
                                        <span class="material-symbols-outlined text-sm" data-icon="schedule">schedule</span>
                                        ${info.displayDate}
                                    </div>
                                    <button onclick="deleteBirthday('${id}')" class="text-xs text-outline hover:text-error transition-colors underline underline-offset-4">삭제</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }
                listDiv.innerHTML += itemHtml;
            });
        });

        window.deleteBirthday = async (id) => {
            if (confirm("이 기록을 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, collectionName, id));
            }
        };
    </script>
</body>

</html>
