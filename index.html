<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 가족 생일 알림이 🎂</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./android-chrome-512x512.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="생일 알림">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>

    <style>
        /* 알림 배너 */
        #notificationBanner {
            display: none;
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: calc(100% - 2rem);
            max-width: 28rem;
        }
    </style>
</head>

<body class="bg-blue-50 min-h-screen p-4 font-sans text-gray-800">

    <!-- 알림 권한 요청 배너 -->
    <div id="notificationBanner" class="bg-yellow-50 border border-yellow-300 rounded-2xl shadow-lg p-4">
        <div class="flex items-start gap-3">
            <span class="text-2xl">🔔</span>
            <div class="flex-1">
                <p class="font-bold text-gray-800 text-sm">생일 하루 전 알림 받기</p>
                <p class="text-xs text-gray-500 mt-1">생일 전날 오전 8시에 알림을 드려요.<br>
                <span class="text-yellow-600 font-medium">📱 iPhone은 홈화면에 추가해야 알림이 작동합니다.</span></p>
                <div class="flex gap-2 mt-3">
                    <button id="allowNotifBtn"
                        class="flex-1 bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-2 px-3 rounded-lg transition">
                        알림 허용하기 ✅
                    </button>
                    <button id="dismissNotifBtn"
                        class="text-gray-400 hover:text-gray-600 text-sm py-2 px-3 rounded-lg border border-gray-200 transition">
                        나중에
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto shadow-lg overflow-hidden rounded-2xl">
        <div class="bg-blue-500 text-white p-6 text-center rounded-t-2xl">
            <h1 class="text-2xl font-bold mb-2">우리 가족 생일 알림이 🎂</h1>
            <p class="text-blue-100 text-sm">올해 생일, 며칠 남았을까?</p>
            <!-- 알림 상태 표시 -->
            <div id="notifStatus" class="mt-3 text-xs text-blue-200 hidden">
                🔔 알림이 설정되어 있습니다
            </div>
        </div>

        <div class="p-6 bg-gray-50 min-h-[300px]">
            <h2 class="text-lg font-bold text-gray-700 mb-4">다가오는 생일 목록</h2>
            <div id="birthdayList" class="space-y-3">
                <p class="text-center text-gray-400 text-sm py-4">데이터를 불러오는 중입니다...</p>
            </div>
        </div>

        <div class="p-6 bg-white border-t border-gray-200 rounded-b-2xl">
            <h2 class="text-sm font-bold text-gray-500 mb-4">새로운 가족 추가하기</h2>
            <div class="flex flex-col space-y-3">
                <input type="text" id="nameInput" placeholder="이름 (예: 첫째 아들, 아내)"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

                <div class="flex space-x-2 items-center">
                    <input type="date" id="dateInput"
                        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <label
                        class="flex items-center space-x-2 text-sm font-medium text-gray-600 bg-gray-100 px-3 py-2 rounded-lg cursor-pointer">
                        <input type="checkbox" id="isLunar" class="w-4 h-4 text-blue-500 rounded focus:ring-blue-400">
                        <span>음력</span>
                    </label>
                </div>

                <button id="addBtn"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                    등록하기 ➕
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTwOAC_LrrKH8CKepUOTf0pyd9qRv4y_8",
            authDomain: "cnation-project.firebaseapp.com",
            projectId: "cnation-project",
            storageBucket: "cnation-project.firebasestorage.app",
            messagingSenderId: "1004154104261",
            appId: "1:1004154104261:web:0eac4c7ded38262ae5c3ac",
            measurementId: "G-7PW1NSP5EQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const collectionName = "cnation-family-birthdays";

        // ───────────────────────────────────────────
        // Service Worker 등록
        // ───────────────────────────────────────────
        async function registerSW() {
            if (!('serviceWorker' in navigator)) return;
            try {
                const reg = await navigator.serviceWorker.register('./sw.js');
                console.log('[SW] 등록 성공:', reg.scope);
                return reg;
            } catch (e) {
                console.error('[SW] 등록 실패:', e);
            }
        }

        // ───────────────────────────────────────────
        // 알림 권한 요청 & 배너 처리
        // ───────────────────────────────────────────
        function showNotifBanner() {
            const banner = document.getElementById('notificationBanner');
            const dismissed = localStorage.getItem('notifBannerDismissed');
            if (dismissed) return;
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') {
                updateNotifStatus(true);
                return;
            }
            if (Notification.permission !== 'denied') {
                banner.style.display = 'block';
            }
        }

        function updateNotifStatus(active) {
            const el = document.getElementById('notifStatus');
            if (active) el.classList.remove('hidden');
            else el.classList.add('hidden');
        }

        document.getElementById('allowNotifBtn').addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            document.getElementById('notificationBanner').style.display = 'none';
            if (permission === 'granted') {
                updateNotifStatus(true);
                // SW에 알림 스케줄 요청
                scheduleBirthdayChecks();
                alert('✅ 알림이 허용되었습니다!\n생일 하루 전 오전 8시에 알림을 드릴게요.');
            } else {
                alert('⚠️ 알림이 거부되었습니다.\n브라우저/기기 설정에서 알림을 허용해주세요.');
            }
        });

        document.getElementById('dismissNotifBtn').addEventListener('click', () => {
            document.getElementById('notificationBanner').style.display = 'none';
            localStorage.setItem('notifBannerDismissed', '1');
        });

        // ───────────────────────────────────────────
        // 생일 알림 스케줄 – SW에 데이터 전달
        // ───────────────────────────────────────────
        function scheduleBirthdayChecks() {
            if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;
            // 현재 birthdayList 데이터를 SW로 전달
            const cached = JSON.parse(localStorage.getItem('birthdayCache') || '[]');
            navigator.serviceWorker.controller.postMessage({
                type: 'SCHEDULE_BIRTHDAY_CHECK',
                birthdays: cached
            });
        }

        // ───────────────────────────────────────────
        // 앱 진입 시 오늘 기준 내일 생일 확인 (foreground)
        // ───────────────────────────────────────────
        function checkTomorrowBirthdays(birthdays) {
            if (Notification.permission !== 'granted') return;

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);

            birthdays.forEach(({ name, birthDate, isLunar }) => {
                const info = calculateBirthdayInfo(birthDate, isLunar);
                if (info.diffDays === 1) {
                    // 오전 8시에 알림 예약
                    const now = new Date();
                    const target = new Date(tomorrow);
                    target.setHours(8, 0, 0, 0);
                    const delay = target - now;

                    if (delay > 0) {
                        const alreadyScheduled = localStorage.getItem(`notif_${name}_${tomorrow.toISOString().split('T')[0]}`);
                        if (!alreadyScheduled) {
                            setTimeout(() => {
                                new Notification(`🎂 내일은 ${name}의 생일이에요!`, {
                                    body: `${info.displayDate} - 미리 준비해 두세요 💝`,
                                    icon: './android-chrome-192x192.png',
                                    badge: './favicon-32x32.png',
                                    tag: `birthday-${name}`,
                                    requireInteraction: true
                                });
                            }, delay);
                            localStorage.setItem(`notif_${name}_${tomorrow.toISOString().split('T')[0]}`, '1');
                        }
                    }
                }
            });
        }

        // ───────────────────────────────────────────
        // 생일 계산
        // ───────────────────────────────────────────
        function calculateBirthdayInfo(birthDateStr, isLunar) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const [birthYear, birthMonth, birthDay] = birthDateStr.split('-').map(Number);
            const currentYear = today.getFullYear();

            let thisYearBirthdaySolar;

            if (isLunar) {
                const lunarDate = Lunar.fromYmd(currentYear, birthMonth, birthDay);
                const solarDateObj = lunarDate.getSolar();
                thisYearBirthdaySolar = new Date(solarDateObj.getYear(), solarDateObj.getMonth() - 1, solarDateObj.getDay());
            } else {
                thisYearBirthdaySolar = new Date(currentYear, birthMonth - 1, birthDay);
            }

            const diffTime = thisYearBirthdaySolar - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            let dDayText = "";
            let textColorClass = "";
            let opacityClass = "opacity-100";

            if (diffDays === 0) {
                dDayText = "D-Day 🎉";
                textColorClass = "text-red-500 font-bold";
            } else if (diffDays > 0) {
                dDayText = `D-${diffDays}`;
                textColorClass = "text-blue-600 font-bold";
            } else {
                dDayText = `D+${Math.abs(diffDays)} (지남)`;
                textColorClass = "text-gray-400";
                opacityClass = "opacity-60";
            }

            const displayDate = `${thisYearBirthdaySolar.getFullYear()}년 ${thisYearBirthdaySolar.getMonth() + 1}월 ${thisYearBirthdaySolar.getDate()}일`;

            return { dDayText, textColorClass, displayDate, diffDays, opacityClass };
        }

        // ───────────────────────────────────────────
        // Firebase – 생일 목록 렌더
        // ───────────────────────────────────────────
        document.getElementById('addBtn').addEventListener('click', async () => {
            const name = document.getElementById('nameInput').value;
            const date = document.getElementById('dateInput').value;
            const isLunar = document.getElementById('isLunar').checked;

            if (!name || !date) {
                alert('이름과 날짜를 모두 입력해주세요!');
                return;
            }

            await addDoc(collection(db, collectionName), { name, birthDate: date, isLunar });
            document.getElementById('nameInput').value = '';
            document.getElementById('dateInput').value = '';
            document.getElementById('isLunar').checked = false;
        });

        onSnapshot(collection(db, collectionName), (snapshot) => {
            const listDiv = document.getElementById('birthdayList');
            listDiv.innerHTML = '';

            if (snapshot.empty) {
                listDiv.innerHTML = '<p class="text-center text-gray-400 text-sm py-4">등록된 생일이 없습니다. 아래에서 가족을 추가해 보세요!</p>';
                return;
            }

            let birthdays = [];
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const info = calculateBirthdayInfo(data.birthDate, data.isLunar);
                birthdays.push({ id: docSnap.id, data, info });
            });

            // localStorage 캐시 갱신 (SW 알림용)
            const cache = birthdays.map(b => ({ name: b.data.name, birthDate: b.data.birthDate, isLunar: b.data.isLunar }));
            localStorage.setItem('birthdayCache', JSON.stringify(cache));

            // 내일 생일 있으면 foreground 알림 예약
            checkTomorrowBirthdays(cache);

            // SW에도 최신 데이터 전달
            if (Notification.permission === 'granted') scheduleBirthdayChecks();

            birthdays.sort((a, b) => {
                const dA = a.info.diffDays, dB = b.info.diffDays;
                const aUp = dA >= 0, bUp = dB >= 0;
                if (aUp && bUp) return dA - dB;
                if (!aUp && !bUp) return dB - dA;
                return aUp ? -1 : 1;
            });

            birthdays.forEach(({ id, data, info }) => {
                const lunarTag = data.isLunar
                    ? '<span class="text-xs bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full ml-2">음력</span>'
                    : '<span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded-full ml-2">양력</span>';

                // D-1 강조
                const isD1 = info.diffDays === 1;
                const d1Badge = isD1 ? '<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full ml-1 animate-pulse">🔔 내일!</span>' : '';

                listDiv.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border ${isD1 ? 'border-yellow-300 ring-2 ring-yellow-200' : 'border-gray-100'} flex justify-between items-center transition hover:shadow-md ${info.opacityClass}">
                        <div>
                            <div class="flex items-center mb-1 flex-wrap gap-1">
                                <span class="font-bold text-gray-800 text-lg">${data.name}</span>
                                ${lunarTag}${d1Badge}
                            </div>
                            <div class="text-xs text-gray-500">
                                원래: ${data.birthDate} <br>
                                올해: ${info.displayDate}
                            </div>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-xl ${info.textColorClass}">${info.dDayText}</span>
                            <button onclick="deleteBirthday('${id}')" class="mt-2 text-xs text-red-400 hover:text-red-600 underline">삭제</button>
                        </div>
                    </div>
                `;
            });
        });

        window.deleteBirthday = async (id) => {
            if (confirm("이 생일 기록을 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, collectionName, id));
            }
        };

        // ───────────────────────────────────────────
        // 초기화
        // ───────────────────────────────────────────
        await registerSW();
        showNotifBanner();

        // 이미 허용된 경우 상태 표시
        if (Notification.permission === 'granted') updateNotifStatus(true);
    </script>
</body>

</html>
